<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный дневник</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>📔 Личный дневник</h1>
        <nav>
            <a href="{{ url_for('index') }}">Главная</a>
            <a href="{{ url_for('add_entry') }}">Новая запись</a>
        </nav>
        <div class="search-container">
            <form method="GET" action="/search">
                <input type="text" name="q" placeholder="Поиск по записям..." value="{{ request.args.get('q', '') }}">
                <button type="submit">🔍 Найти</button>
            </form>
        </div>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2025 Личный дневник. Создано с любовью на Flask.</p>
        <p>Автор: <strong>Ваше Имя</strong></p>
    </footer>
</body>
</html>
